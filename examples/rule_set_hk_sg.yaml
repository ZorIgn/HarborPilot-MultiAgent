rule_set_id: hk_sg_taught_master_2027_v1
principles:
  - hard requirements are evaluated by code, not generated by LLM
  - missing data never passes a hard requirement
  - not_published fields require human review
rules:
  - id: min_gpa
    type: hard
    input: profile.education.gpa
    operator: greater_equal
    source: program.requirements.min_gpa
  - id: ielts_overall
    type: hard
    input: profile.language.overall
    operator: greater_equal
    source: program.requirements.language.IELTS
  - id: prerequisite_signal
    type: soft
    input: profile.education.major + profile.experiences.tools + profile.raw_interest_text
    operator: contains_all
    source: program.requirements.prerequisites
  - id: not_published_deadline
    type: human_gate
    input: program.deadline
    operator: equals
    value: NOT_PUBLISHED

