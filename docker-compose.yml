services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      HARBOR_AGENT_LLM_MODE: ${HARBOR_AGENT_LLM_MODE:-mock}
      HARBOR_AGENT_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HARBOR_AGENT_OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      HARBOR_AGENT_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

